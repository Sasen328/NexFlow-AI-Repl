<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8A0C8"/>
      <stop offset="35%"  stop-color="#88B8B0"/>
      <stop offset="70%"  stop-color="#C8A880"/>
      <stop offset="100%" stop-color="#C0A0B8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8A0C8"/>
      <stop offset="50%"  stop-color="#88B8B0"/>
      <stop offset="100%" stop-color="#C8A880"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#C0A0B8"/>
      <stop offset="50%"  stop-color="#88B8B0"/>
      <stop offset="100%" stop-color="#C8A880"/>
    </linearGradient>
    <linearGradient id="g4" x1="200" y1="200" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8A0C8"/>
      <stop offset="100%" stop-color="#88B8B0"/>
    </linearGradient>
    <linearGradient id="gdot" x1="450" y1="450" x2="574" y2="574" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B8A0C8"/>
      <stop offset="100%" stop-color="#88B8B0"/>
    </linearGradient>
  </defs>

  <!-- Outermost diamond -->
  <rect
    x="82" y="82" width="860" height="860" rx="72" ry="72"
    transform="rotate(45 512 512)"
    fill="none"
    stroke="url(#g1)"
    stroke-width="18"
  />

  <!-- Second diamond -->
  <rect
    x="196" y="196" width="632" height="632" rx="54" ry="54"
    transform="rotate(45 512 512)"
    fill="none"
    stroke="url(#g2)"
    stroke-width="16"
  />

  <!-- Third diamond -->
  <rect
    x="304" y="304" width="416" height="416" rx="38" ry="38"
    transform="rotate(45 512 512)"
    fill="none"
    stroke="url(#g3)"
    stroke-width="14"
  />

  <!-- Inner diamond -->
  <rect
    x="390" y="390" width="244" height="244" rx="22" ry="22"
    transform="rotate(45 512 512)"
    fill="none"
    stroke="url(#g4)"
    stroke-width="12"
  />

  <!-- Center dot -->
  <circle cx="512" cy="512" r="38" fill="url(#gdot)"/>
</svg>
