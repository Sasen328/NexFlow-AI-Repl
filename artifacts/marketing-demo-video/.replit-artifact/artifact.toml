kind = "video"
previewPath = "/marketing-demo-video/"
title = "NexFlow Marketing Demo"
version = "1.0.0"
id = "artifacts/marketing-demo-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/marketing-demo-video/" ]
localPort = 19255

[services.development]
run = "pnpm --filter @workspace/marketing-demo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marketing-demo-video", "run", "build" ]
publicDir = "artifacts/marketing-demo-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19255"
BASE_PATH = "/marketing-demo-video/"
