<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NexFlow — Enrichment Engine Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ac:#B8A0C8; --tl:#88B8B0; --gd:#C8A880; --re:#C88888;
  --bg:#0e0f14; --s1:#13141a; --s2:#1a1b22; --s3:#242530;
  --tx:#e2e2e2; --tm:#aaa; --ts:#666; --bd:rgba(255,255,255,.07);
  --bda:rgba(184,160,200,.25); --bdt:rgba(136,184,176,.25); --bdg:rgba(200,168,128,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:13px}
.mono{font-family:"JetBrains Mono",monospace}
.display{font-family:"Playfair Display",serif}

/* ── bars ── */
.cmdbar{display:flex;align-items:center;gap:10px;padding:10px 20px;
  background:rgba(19,20,26,.9);border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:40;backdrop-filter:blur(16px)}
.logo{width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--ac),#7060a0);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
.brand{font-weight:700;font-size:14px;color:var(--tx)}
.brand span{color:var(--ac)}
.search{flex:1;max-width:420px;padding:6px 12px;border-radius:9px;
  border:1px solid var(--bd);background:var(--s2);color:var(--tm);font-size:12px;outline:none}
.toggles{display:flex;gap:8px;margin-left:auto}
.tog{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
  border:1px solid;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s}
.tog.sig{border-color:var(--bdt);background:rgba(136,184,176,.08);color:var(--tl)}
.tog.sig.off{border-color:var(--bd);background:transparent;color:var(--ts)}
.tog.rel{border-color:var(--bdg);background:rgba(200,168,128,.08);color:var(--gd)}
.tog.rel.off{border-color:var(--bd);background:transparent;color:var(--ts)}
.togdot{width:26px;height:14px;border-radius:999px;transition:all .2s;position:relative;flex-shrink:0}
.togdot::after{content:"";position:absolute;top:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:all .2s}
.tog.sig .togdot{background:var(--tl)}
.tog.sig .togdot::after{left:14px}
.tog.sig.off .togdot{background:var(--s3)}
.tog.sig.off .togdot::after{left:2px}
.tog.rel .togdot{background:var(--gd)}
.tog.rel .togdot::after{left:14px}
.tog.rel.off .togdot{background:var(--s3)}
.tog.rel.off .togdot::after{left:2px}

.tabbar{display:flex;gap:3px;padding:8px 14px;background:var(--s1);
  border-bottom:1px solid var(--bd);overflow-x:auto;position:sticky;top:51px;z-index:30}
.tab{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;
  font-size:12.5px;font-weight:500;color:var(--ts);cursor:pointer;white-space:nowrap;
  border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--tm);background:var(--s2)}
.tab.on{background:rgba(184,160,200,.12);color:var(--ac);border-color:var(--bda)}
.tab .badge{font-size:9px;padding:2px 6px;border-radius:999px;font-weight:700;
  background:rgba(136,184,176,.15);color:var(--tl)}

.subbar{display:flex;gap:16px;padding:8px 20px;border-bottom:1px solid var(--bd);
  background:rgba(19,20,26,.6);overflow-x:auto}
.sub{font-size:12px;color:var(--ts);cursor:pointer;padding:4px 2px;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.sub:hover{color:var(--tm)}
.sub.on{color:var(--ac);border-color:var(--ac);font-weight:600}

.wrap{max-width:1100px;margin:0 auto;padding:22px 20px 80px}

/* ── components ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:16px}
.card.ac{border-color:var(--bda);background:rgba(184,160,200,.04)}
.card.tl{border-color:var(--bdt);background:rgba(136,184,176,.04)}
.card.gd{border-color:var(--bdg);background:rgba(200,168,128,.04)}

.h1{font-size:22px;font-weight:700;margin-bottom:4px}
.psub{color:var(--ts);font-size:12px;margin-bottom:18px;line-height:1.5}

.row{display:flex;gap:14px;flex-wrap:wrap}
.col{flex:1;min-width:240px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

.stat{font-size:26px;font-weight:700}
.stl{font-size:9px;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.badge{display:inline-block;padding:2px 7px;border-radius:6px;
  font-size:9.5px;font-weight:700;font-family:"JetBrains Mono",monospace}

.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;
  border:1px solid var(--bd);color:var(--ts);cursor:pointer;transition:all .15s;margin:0 3px 3px 0}
.pill.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.pill.tl{background:rgba(136,184,176,.15);color:var(--tl);border-color:var(--bdt)}
.pill.gd{background:rgba(200,168,128,.15);color:var(--gd);border-color:var(--bdg)}

.verdict{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;
  font-weight:600;background:rgba(184,160,200,.1);color:var(--ac);
  border:1px solid var(--bda)}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;
  border-radius:9px;font-weight:600;font-size:12px;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--tx);transition:all .15s}
.btn:hover{background:var(--s2);border-color:var(--bda);color:var(--ac)}
.btn.p{background:linear-gradient(135deg,var(--ac),#7060a0);color:#fff;border:none}
.btn.p:hover{opacity:.9}
.btn.tl{background:rgba(136,184,176,.12);color:var(--tl);border-color:var(--bdt)}
.btn.gd{background:rgba(200,168,128,.12);color:var(--gd);border-color:var(--bdg)}
.btn.sm{padding:5px 10px;font-size:11px}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 12px;background:rgba(184,160,200,.06);
  font-weight:600;color:var(--tm);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 12px;border-top:1px solid var(--bd)}
tr:hover td{background:rgba(255,255,255,.02)}

.inp{width:100%;padding:8px 12px;border-radius:9px;border:1px solid var(--bd);
  background:var(--s2);color:var(--tx);font-size:12px;outline:none}
.inp:focus{border-color:var(--bda)}

.log{font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.9;color:var(--tm)}
.log .ok{color:var(--tl)}
.log .ac{color:var(--ac)}
.log .gd{color:var(--gd)}
.log .re{color:var(--re)}

.step{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:12.5px}
.sc{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;
  background:linear-gradient(135deg,var(--ac),#7060a0)}
.sc.off{background:var(--s3);color:var(--ts)}

.chat{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.msg{max-width:78%;padding:10px 14px;border-radius:14px;font-size:12.5px;line-height:1.55}
.msg.u{background:linear-gradient(135deg,var(--ac),#7060a0);color:#fff;margin-left:auto}
.msg.a{background:var(--s2);border:1px solid var(--bd)}
.crumb{font-size:10px;color:var(--ts);margin-bottom:6px}

/* orbit */
.orbit{position:relative;width:280px;height:280px;margin:8px auto}
.core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:66px;height:66px;border-radius:50%;
  background:linear-gradient(135deg,var(--ac),#5040a0);color:#fff;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;text-align:center}
.node{position:absolute;transform:translate(-50%,-50%);width:40px;height:40px;
  border-radius:50%;color:#fff;font-size:7.5px;font-weight:700;
  font-family:"JetBrains Mono",monospace;display:flex;align-items:center;justify-content:center;
  text-align:center;border:2px solid rgba(255,255,255,.2);transition:all .2s;cursor:default}

.eng{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 14px;border-radius:10px;border:1px solid var(--bd);
  font-size:11px;font-weight:600;color:var(--ts);cursor:pointer;transition:all .15s}
.eng.on{background:rgba(184,160,200,.08);color:var(--ac);border-color:var(--bda)}
.eng.tl.on{background:rgba(136,184,176,.08);color:var(--tl);border-color:var(--bdt)}
.eng.gd.on{background:rgba(200,168,128,.08);color:var(--gd);border-color:var(--bdg)}
.eng:hover:not(.on){color:var(--tm);background:var(--s2)}

/* signal source row */
.src{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-top:1px solid var(--bd);font-size:12px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* pipeline flow */
.pipe{display:flex;align-items:center;gap:0;flex-wrap:wrap;margin:10px 0}
.pa{display:flex;align-items:center;gap:0}
.pa .lbl{padding:5px 10px;border-radius:8px;font-size:10.5px;font-weight:600;
  background:rgba(184,160,200,.1);color:var(--ac);border:1px solid var(--bda)}
.pa .arr{font-size:11px;color:var(--ts);padding:0 4px}

/* tag strip */
.tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.tag{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;
  background:rgba(184,160,200,.08);color:var(--ac);border:1px solid var(--bda)}
.tag.tl{background:rgba(136,184,176,.08);color:var(--tl);border-color:var(--bdt)}
.tag.gd{background:rgba(200,168,128,.08);color:var(--gd);border-color:var(--bdg)}

.divider{height:1px;background:var(--bd);margin:14px 0}
.seclbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--ts);margin-bottom:8px}
.hr{color:var(--ts)}
.note{font-size:11px;color:var(--ts);margin-top:16px;line-height:1.6;
  padding:10px 14px;border-radius:9px;border:1px solid var(--bdg);background:rgba(200,168,128,.05)}

/* score bar */
.sbar{height:5px;border-radius:3px;background:var(--s3);overflow:hidden;margin-top:6px}
.sbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--tl),var(--ac))}

@media(max-width:780px){.g2,.g3,.g4{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- ══ COMMAND BAR ══ -->
<div class="cmdbar">
  <div class="logo">N</div>
  <div class="brand">Nex<span>Flow</span></div>
  <input class="search" value="Enrichment Engine · ⌘K" readonly>
  <div class="toggles">
    <div class="tog sig" id="togSig" onclick="toggleSig()">
      <span>📡</span><span id="sigLbl">Signal Intel</span><div class="togdot"></div>
    </div>
    <div class="tog rel" id="togRel" onclick="toggleRel()">
      <span>🕸</span><span id="relLbl">Relationship</span><div class="togdot"></div>
    </div>
  </div>
</div>

<!-- ══ TAB BAR ══ -->
<div class="tabbar" id="tabbar"></div>
<div class="subbar" id="subbar"></div>
<div class="wrap" id="content"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let tab = "hub", sub = 0;
let sigOn = true, relOn = true;

function toggleSig(){
  sigOn=!sigOn;
  document.getElementById('togSig').className='tog sig'+(sigOn?'':' off');
  document.getElementById('sigLbl').textContent='Signal Intel'+(sigOn?'':' OFF');
}
function toggleRel(){
  relOn=!relOn;
  document.getElementById('togRel').className='tog rel'+(relOn?'':' off');
  document.getElementById('relLbl').textContent='Relationship'+(relOn?'':' OFF');
}
function setTab(t){tab=t;sub=0;render();}
function setSub(i){sub=i;render();}

// ─── Tab definitions ─────────────────────────────────────────────────────────
const TABS=[
  {id:"hub",    label:"Enrich Agentic Hub", badge:"NEW",
   subs:["AI Chat","SwarmBoard","Lead Genome","Lead Factory"]},
  {id:"harvest",label:"Harvest AI",
   subs:["ICP Territory Scanner","Masaar Engine","Masaar Database","AI DB Builder"]},
  {id:"cards",  label:"Card Scanner"},
  {id:"pros",   label:"ProsEngine",
   subs:["Company Intel","Person Intel","Website Intel","Data Seeder"]},
  {id:"enrich", label:"CRM Enrichment",
   subs:["Quick Enrich","Bulk Upload","Waterfall Sources"]},
  {id:"settings",label:"Settings",
   subs:["Signal Sources","Relationship Engines","API Keys","Dedup"]},
];

// ─── Helpers ─────────────────────────────────────────────────────────────────
const hl = (s,c='var(--ac)')=>`<span style="color:${c};font-weight:600">${s}</span>`;
const score=(n,c)=>`<div style="font-size:22px;font-weight:700;color:${c||'var(--ac)'}">${n}</div>`;
const pill=(l,on=false)=>`<span class="pill${on?' on':''}">${l}</span>`;
const badge=(l,col)=>`<span class="badge" style="background:${col||'var(--ac)'}20;color:${col||'var(--ac)'};">${l}</span>`;
const v=(n)=>`<span class="verdict">◆ ${n}</span>`;
const step=(n,lbl,done=true)=>`<div class="step"><div class="sc${done?'':' off'}">${n}</div><span>${lbl}</span></div>`;
const pipeStep=(l)=>`<div class="pa"><div class="lbl">${l}</div><div class="arr">→</div></div>`;

// ─── Views ───────────────────────────────────────────────────────────────────
const V={};

// ══════════════════════════════════════════════════════════
// HUB — Enrich Agentic Hub
// ══════════════════════════════════════════════════════════
V.hub=()=>{
  // sub 0: AI Chat
  if(sub===0) return `
    <h1 class="h1 display">AI Chat Agent</h1>
    <p class="psub">9-tool composer loop · Nexus-tier model routing · Swarm toggle · Arabic-first · streaming responses</p>
    <div class="row" style="margin-bottom:14px">
      <div class="col" style="max-width:260px">
        <div class="card" style="margin-bottom:12px">
          <div class="seclbl">Nexus Tier</div>
          ${[["Planner","Kimi (Moonshot)","var(--gd)"],
             ["Researcher","Perplexity Pro","var(--tl)"],
             ["Writer","Claude 3.5","var(--ac)"],
             ["Arabic","GPT-4o","#88b890"],
             ["Bulk","DeepSeek v3","#8898c8"],
             ["Validator","GPT-4o-mini","#c8a0a0"]
          ].map(([r,m,c])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd)">
            <span style="font-size:11px;color:var(--ts)">${r}</span>
            <span class="badge" style="background:${c}18;color:${c}">${m}</span>
          </div>`).join('')}
        </div>
        <div class="card">
          <div class="seclbl">Active Tools (9)</div>
          <div class="tags">
            ${["Masaar Search","Person Intel","Company Intel","Website Intel","Lead Factory","Signal Intel","Masar DB","AI Builder","Genome Push"].map(t=>`<div class="tag" style="font-size:10px">${t}</div>`).join('')}
          </div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            ${pill("Swarm: ON",true)}${pill("Arabic-first")}${pill("Show trace")}${pill("Customize")}
          </div>
        </div>
      </div>
      <div class="col">
        <div class="card" style="margin-bottom:12px">
          <div class="chat">
            <div class="msg u">Find me 5 SaaS CTOs in Riyadh actively hiring backend engineers, include signals</div>
            <div class="msg a">
              <div class="crumb">🧠 Kimi planned → 🔍 Perplexity ×3 searched → 🛰 Harvester crawled → 📊 Extractor structured → ✏️ Writer humanized</div>
              Found <b>5 high-fit CTOs</b> at Riyadh SaaS firms with active backend hiring.${sigOn?` Signal Intelligence detected <b style="color:var(--tl)">12 LinkedIn job posts</b> and <b style="color:var(--tl)">3 funding events</b> in 90 days.`:''} ${relOn?`Relationship Intel mapped <b style="color:var(--gd)">org charts</b> for all 5.`:''}<br><br>
              Top match: <b>Lean Technologies</b> — CTO hiring 12 backend roles (LinkedIn + careers page corroborated). ${v(94)}
              <div style="margin-top:10px;display:flex;gap:6px">
                <button class="btn tl sm">Push all to Genome</button>
                <button class="btn sm">Export JSON</button>
                <button class="btn sm">View trace</button>
              </div>
            </div>
            <div class="msg u">Who's the VP Engineering at Tamara and what did they post this week?</div>
            <div class="msg a">
              <div class="crumb">🔍 Person Intel → LinkedIn crawl → ${sigOn?'📡 Signal scan →':''} ✓</div>
              <b>Omar Al-Farhan</b>, VP Engineering · Tamara (BNPL, Riyadh). ${sigOn?`<b style="color:var(--tl)">Signal:</b> posted about Rust migration last Tuesday — 847 impressions.`:'No signal data (toggle Signal Intel to enable)'} ${v(88)}
              <div style="margin-top:8px"><button class="btn tl sm">Push to Genome</button></div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <input class="inp" placeholder="Ask anything — routes to web search, CR lookup, Person Intel, Signals…">
            <button class="btn p">Send ▸</button>
          </div>
        </div>
        <div class="note">💡 <b>Plan B active:</b> if primary LLM unavailable, Nexus auto-routes to next available tier. All responses humanized (no markdown artifacts).</div>
      </div>
    </div>`;

  // sub 1: SwarmBoard
  if(sub===1) return `
    <h1 class="h1 display">SwarmBoard</h1>
    <p class="psub">Kimi-coordinated multi-agent mission · Mission brief → Agents → Live orbit → Fused report</p>
    <div class="g4" style="margin-bottom:16px">
      ${[["🐝","Agents","8 active","var(--ac)"],["📦","Records","1,284","var(--tl)"],["⚡","Avg time","14.2s","var(--gd)"],["◆","Trust","97%","var(--ac)"]].map(([ic,l,v,c])=>`
        <div class="card"><div style="font-size:20px;margin-bottom:4px">${ic}</div>
          <div class="stat" style="color:${c}">${v}</div><div class="stl">${l}</div></div>`).join('')}
    </div>
    <div class="row">
      <div class="col">
        <div class="card">
          <div class="seclbl" style="margin-bottom:12px">Mission Brief</div>
          <div style="padding:10px 12px;background:var(--s2);border-radius:9px;border:1px solid var(--bda);font-size:12.5px;margin-bottom:12px">
            "Enrich 50 Saudi fintech companies (50–500 emp) · full profile, buying signals, executive map, credibility verdicts"
          </div>
          <div class="seclbl">Phase</div>
          ${[["1","Brief parsed","Kimi extracted 14 parameters from brief",true],
             ["2","Agents dispatched","8 agents started in parallel",true],
             ["3","Harvesting","Masaar + Masar DB + web crawl running",true],
             ["4","Enriching","Person Intel + Signals per company",true],
             ["5","Fusing","Claude arbitrating agent outputs","running"],
             ["6","Report","Humanizer + verdicts","queue"]
          ].map(([n,l,d,s])=>`<div class="step">
            <div class="sc${s==='queue'?' off':''}" style="${s==='running'?'background:linear-gradient(135deg,var(--tl),var(--ac))':''}">
              ${s==='running'?'…':s==='queue'?n:'✓'}</div>
            <div><div style="font-weight:600">${l}</div><div style="font-size:11px;color:var(--ts)">${d}</div></div>
          </div>`).join('')}
        </div>
      </div>
      <div class="col">
        <div class="card" style="margin-bottom:12px">
          <div class="seclbl" style="margin-bottom:8px">Live Orbit — 5/8 complete</div>
          <div class="orbit" id="orbit">
            <div class="core">SWARM<br>CORE</div>
            ${["NEXUS","MASAAR","MASAR","PROSENGINE","SIGNALS","BUILDER","PERSON","DEDUP"].map((n,i)=>{
              const cols=["#B8A0C8","#C8A880","#88B8B0","#B8A0C8","#88B8B0","#C8A880","#B8A0C8","#888"];
              const ang=(i/8)*6.283-1.57,r=110,x=140+r*Math.cos(ang),y=140+r*Math.sin(ang);
              const done=i<5;
              return `<div class="node" style="left:${x}px;top:${y}px;background:${cols[i]};opacity:${done?1:.3}">${n.length>6?n.slice(0,5):n}</div>`;
            }).join('')}
          </div>
          <div style="text-align:center;font-size:11px;color:var(--ts)">23/50 companies enriched · ~3m 40s remaining</div>
          <div class="sbar" style="margin-top:8px"><div class="sbar-fill" style="width:46%"></div></div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
            <div class="seclbl">Fused Report Preview</div>${v(94)}
          </div>
          <p style="font-size:12.5px;line-height:1.65;color:var(--tm)">
            <b style="color:var(--tx)">Saudi fintech (50–500 emp).</b> 1,284 companies matched; 312 high-fit (ICP ≥ 0.7). 41 funding and hiring signals detected in 90 days; 7 SAMA-licensed fintechs prioritised. ${sigOn?`268 verified executive contacts from LinkedIn and domain harvest.`:''} ${relOn?`Org charts generated for 23 companies.`:''}
          </p>
          <div class="tags" style="margin-top:10px">

            </td>
            <td><button class="btn sm">Test</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  if(sub===1) return `
    <h1 class="h1 display">Relationship Engines</h1>
    <p class="psub">Sherlock · TheHarvester · network graph · Apollo — org chart + network mapping across Person/Company reports</p>
    <div class="g2">
      ${[["🔍 Sherlock","Username + profile discovery across 300+ social sites","var(--tl)","active","Relationship Intel"],
         ["🌐 TheHarvester","Email + subdomain + employee name discovery","var(--ac)","active","Relationship Intel"],
         ["🕸 Network Graph","Visual org chart overlay on Person/Company reports","var(--gd)","active","Display layer"],
         ["📇 Apollo Contacts","Verified email + phone enrichment layer","#8898c8","active","Contact enrichment"],
      ].map(([n,d,c,s,r])=>`
        <div class="card" style="border-color:${c}30;background:${c}04">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
            <div style="font-weight:700;color:${c}">${n}</div>
            ${badge(s as string,'var(--tl)')}
          </div>
          <div style="font-size:12px;color:var(--tm);margin-bottom:8px">${d}</div>
          <div style="font-size:11px;color:var(--ts);margin-bottom:10px">Role: ${r}</div>
          <div style="display:flex;gap:6px">
            <button class="btn sm tl">Configure</button>
            <button class="btn sm">Test</button>
          </div>
        </div>`).join('')}
    </div>`;

  if(sub===2) return `
    <h1 class="h1 display">API Keys</h1>
    <p class="psub">LLM providers · scrapers · enrichment sources · all keys stored encrypted · none visible after save</p>
    <div class="card">
      <table>
        <thead><tr><th>Provider</th><th>Role</th><th>Status</th><th>Last used</th><th></th></tr></thead>
        <tbody>
          ${[["OpenAI","Validator + Arabic","configured","2m ago"],["Anthropic / Claude","Synthesis","configured","4m ago"],["Gemini","Parallel research","configured","4m ago"],["Perplexity","Web search ×9","configured","2m ago"],["Moonshot Kimi","Planner","configured","5m ago"],["DeepSeek","Bulk classifier","not set","—"],["OpenRouter","Fusion + fallback","configured","1m ago"],["Apollo","Contact enrichment","configured","12m ago"]].map(([n,r,s,l])=>`<tr>
            <td style="font-weight:600">${n}</td>
            <td style="color:var(--ts)">${r}</td>
            <td>${badge(s,s==='configured'?'var(--tl)':s==='not set'?'var(--re)':'var(--gd)')}</td>
            <td style="color:var(--ts)">${l}</td>
            <td><button class="btn sm">${s==='configured'?'Rotate':'Set key'}</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  return `
    <h1 class="h1 display">Deduplication</h1>
    <p class="psub">Block-key matching · fuzzy name + domain + phone · survivor preference · auto-clean schedule</p>
    <div class="g2">
      <div class="card">
        <div class="seclbl">Dedup Config</div>
        ${[["Block keys",["Name + Domain","Email hash","Phone","LinkedIn URL"]],
           ["Fuzzy threshold",["70%","80%","90%","95%"]],
           ["Survivor preference",["Keep most enriched","Keep newest","Keep highest ICP"]],
        ].map(([l,opts])=>`
          <div style="margin:12px 0">
            <div style="font-size:11px;color:var(--ts);margin-bottom:6px">${l}</div>
            <div>${(opts as string[]).map((o,i)=>pill(o,i===1)).join('')}</div>
          </div>`).join('')}
        <div style="margin-top:14px;display:flex;gap:8px">
          <button class="btn p">Run dedup now</button>
          <button class="btn sm">Schedule daily</button>
        </div>
      </div>
      <div class="card">
        <div class="seclbl">Last Dedup Run</div>
        <div class="log" style="margin-top:10px">
          <div class="ac">✓ 14,280 records scanned</div>
          <div class="ok">✓ 1,102 duplicate clusters found</div>
          <div class="gd">✓ Survivors kept: 13,178</div>
          <div style="color:var(--ts)">→ Next auto-run: tomorrow 03:00 UTC</div>
        </div>
        <div class="g2" style="gap:10px;margin-top:14px">
          ${[["14,280","Scanned","var(--tm)"],["1,102","Duplicates","var(--re)"],["13,178","Kept","var(--tl)"]].map(([n,l,c])=>`
            <div><div class="stat" style="font-size:22px;color:${c}">${n}</div><div class="stl">${l}</div></div>`).join('')}
        </div>
      </div>
    </div>`;
};

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('tabbar').innerHTML =
    TABS.map(t=>`<div class="tab ${t.id===tab?'on':''}" onclick="setTab('${t.id}')">
      ${t.label}${t.badge?`<span class="badge">${t.badge}</span>`:''}
    </div>`).join('');
  const def=TABS.find(t=>t.id===tab);
  const subs=def?.subs;
  const sb=document.getElementById('subbar');
  if(subs){
    sb.innerHTML=subs.map((s,i)=>`<div class="sub ${i===sub?'on':''}" onclick="setSub(${i})">${s}</div>`).join('');
    sb.style.display='flex';
  } else {
    sb.innerHTML=''; sb.style.display='none';
  }
  document.getElementById('content').innerHTML=(V[tab]||(()=>'<div style="padding:40px;color:var(--ts)">—</div>'))();
}
render();
</script>
</body>
</html>
