kind = "web"
previewPath = "/"
title = "NexFlow CRM"
version = "1.0.0"
id = "artifacts/nexflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18153

[services.development]
run = "pnpm --filter @workspace/nexflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexflow", "run", "build" ]
publicDir = "artifacts/nexflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18153"
BASE_PATH = "/"
