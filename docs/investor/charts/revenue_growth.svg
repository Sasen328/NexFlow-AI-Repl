<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Manrope, system-ui, sans-serif">
  <defs>
    <linearGradient id="rg-arr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7CC8B8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7CC8B8" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="rg-rev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3F2E56" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3F2E56" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="720" height="360" fill="#F4F2F0"/>
  <text x="36" y="36" font-size="16" font-weight="700" fill="#3F2E56" letter-spacing="2">REVENUE &amp; ARR — YEAR-END, USD MILLIONS</text>
  <text x="36" y="56" font-size="11" fill="#3F2E56" opacity="0.6">Recognised revenue (left bar) and ending ARR (right bar) per fiscal year. Source: financial model sheet 03 · Revenue Build.</text>

  <!-- Y axis -->
  <line x1="80" y1="100" x2="80" y2="290" stroke="#3F2E56" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="80" y1="290" x2="690" y2="290" stroke="#3F2E56" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Y ticks -->
  <g font-size="10" fill="#3F2E56" opacity="0.65" text-anchor="end">
    <text x="74" y="294">$0</text>
    <text x="74" y="246">$45M</text>
    <text x="74" y="198">$90M</text>
    <text x="74" y="150">$135M</text>
    <text x="74" y="104">$180M</text>
  </g>
  <g stroke="#3F2E56" stroke-opacity="0.08">
    <line x1="80" y1="246" x2="690" y2="246"/>
    <line x1="80" y1="198" x2="690" y2="198"/>
    <line x1="80" y1="150" x2="690" y2="150"/>
    <line x1="80" y1="104" x2="690" y2="104"/>
  </g>

  <!-- Year 1 -->
  <!-- revenue $1.68M -> 290 - (1.68/180)*186 = 290 - 1.74 = 288 -->
  <rect x="120" y="288" width="70" height="2" fill="url(#rg-rev)"/>
  <!-- ARR $4.26M -> 290 - (4.26/180)*186 = 290 - 4.4 = 286 -->
  <rect x="200" y="286" width="70" height="4" fill="url(#rg-arr)"/>
  <text x="155" y="320" font-size="11" font-weight="700" fill="#3F2E56" text-anchor="middle">YEAR 1</text>
  <text x="155" y="334" font-size="10" fill="#3F2E56" opacity="0.65" text-anchor="middle">$1.68M / $4.26M</text>

  <!-- Year 2 -->
  <!-- revenue $19.72M -> 290 - (19.72/180)*186 = 290 - 20.4 = 269.6 -->
  <rect x="320" y="270" width="70" height="20" fill="url(#rg-rev)"/>
  <!-- ARR $36.33M -> 290 - (36.33/180)*186 = 290 - 37.5 = 252.5 -->
  <rect x="400" y="252" width="70" height="38" fill="url(#rg-arr)"/>
  <text x="355" y="320" font-size="11" font-weight="700" fill="#3F2E56" text-anchor="middle">YEAR 2</text>
  <text x="355" y="334" font-size="10" fill="#3F2E56" opacity="0.65" text-anchor="middle">$19.72M / $36.33M</text>

  <!-- Year 3 -->
  <!-- revenue $110.66M -> 290 - (110.66/180)*186 = 290 - 114.3 = 175.7 -->
  <rect x="520" y="176" width="70" height="114" fill="url(#rg-rev)"/>
  <!-- ARR $178.33M -> 290 - (178.33/180)*186 = 290 - 184.2 = 105.8 -->
  <rect x="600" y="106" width="70" height="184" fill="url(#rg-arr)"/>
  <text x="555" y="320" font-size="11" font-weight="700" fill="#3F2E56" text-anchor="middle">YEAR 3</text>
  <text x="555" y="334" font-size="10" fill="#3F2E56" opacity="0.65" text-anchor="middle">$110.66M / $178.33M</text>

  <!-- Legend -->
  <g transform="translate(440,72)">
    <rect x="0" y="0" width="14" height="14" fill="url(#rg-rev)"/>
    <text x="20" y="11" font-size="11" fill="#3F2E56">Recognised revenue</text>
    <rect x="140" y="0" width="14" height="14" fill="url(#rg-arr)"/>
    <text x="160" y="11" font-size="11" fill="#3F2E56">Ending ARR</text>
  </g>
</svg>
