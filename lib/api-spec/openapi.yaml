openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NexFlow CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: contacts
  - name: companies
  - name: deals
  - name: activities
  - name: signals
  - name: segments
  - name: calls
  - name: scripts
  - name: notifications
  - name: analytics
  - name: ai
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Contacts ──
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: segment_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /contacts/{id}/activities:
    get:
      operationId: getContactActivities
      tags: [contacts]
      summary: Get contact activity timeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  # ── Companies ──
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyListResponse"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Created company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Delete company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Deals / Pipeline ──
  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List deals
      parameters:
        - name: stage
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of deals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealListResponse"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDealBody"
      responses:
        "201":
          description: Created deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
    patch:
      operationId: updateDeal
      tags: [deals]
      summary: Update deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDealBody"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
    delete:
      operationId: deleteDeal
      tags: [deals]
      summary: Delete deal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Activities ──
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities
      parameters:
        - name: contact_id
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Create activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  # ── Signals ──
  /signals:
    get:
      operationId: listSignals
      tags: [signals]
      summary: List signals
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"
    post:
      operationId: createSignal
      tags: [signals]
      summary: Create signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSignalBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  /signals/{id}/dismiss:
    post:
      operationId: dismissSignal
      tags: [signals]
      summary: Dismiss a signal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signal dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"

  # ── Segments ──
  /segments:
    get:
      operationId: listSegments
      tags: [segments]
      summary: List segments
      responses:
        "200":
          description: Segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"
    post:
      operationId: createSegment
      tags: [segments]
      summary: Create segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /segments/{id}:
    get:
      operationId: getSegment
      tags: [segments]
      summary: Get segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
    delete:
      operationId: deleteSegment
      tags: [segments]
      summary: Delete segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Calls ──
  /calls:
    get:
      operationId: listCalls
      tags: [calls]
      summary: List calls
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Call"
    post:
      operationId: createCall
      tags: [calls]
      summary: Initiate call
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCallBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  /calls/{id}:
    get:
      operationId: getCall
      tags: [calls]
      summary: Get call
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Call"

  # ── Scripts ──
  /scripts:
    get:
      operationId: listScripts
      tags: [scripts]
      summary: List scripts
      responses:
        "200":
          description: Scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"
    post:
      operationId: createScript
      tags: [scripts]
      summary: Create script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScriptBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      summary: Get script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
    patch:
      operationId: updateScript
      tags: [scripts]
      summary: Update script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScriptBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
    delete:
      operationId: deleteScript
      tags: [scripts]
      summary: Delete script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ── Notifications ──
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: unread_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required:
                  - updated

  # ── Dashboard ──
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /dashboard/pipeline-by-stage:
    get:
      operationId: getPipelineByStage
      tags: [dashboard]
      summary: Get pipeline grouped by stage
      responses:
        "200":
          description: Pipeline stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /dashboard/signal-summary:
    get:
      operationId: getSignalSummary
      tags: [dashboard]
      summary: Get signal intelligence summary
      responses:
        "200":
          description: Signal summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignalSummary"

  /dashboard/top-contacts:
    get:
      operationId: getTopContacts
      tags: [dashboard]
      summary: Get top contacts by score
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  # ── Analytics ──
  /analytics/revenue-trend:
    get:
      operationId: getRevenueTrend
      tags: [analytics]
      summary: Revenue trend over time
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /analytics/call-stats:
    get:
      operationId: getCallStats
      tags: [analytics]
      summary: Call statistics
      responses:
        "200":
          description: Call stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallStats"

  /analytics/forecast:
    get:
      operationId: getForecast
      tags: [analytics]
      summary: Revenue forecast
      responses:
        "200":
          description: Forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Forecast"

  # ── AI ──
  /ai/assistant:
    post:
      operationId: aiAssistantChat
      tags: [ai]
      summary: AI assistant chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /ai/score-contact/{id}:
    post:
      operationId: scoreContact
      tags: [ai]
      summary: AI lead scoring for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Score result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResult"

  /ai/daily-briefing:
    get:
      operationId: getDailyBriefing
      tags: [ai]
      summary: Get today's AI-generated daily briefing
      responses:
        "200":
          description: Daily briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyBriefing"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Contact:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        title:
          type: string
        company_id:
          type: string
        company_name:
          type: string
        lead_score:
          type: number
        status:
          type: string
          enum: [new, active, qualified, unqualified, customer]
        avatar_url:
          type: string
        linkedin_url:
          type: string
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - first_name
        - last_name
        - status
        - created_at

    ContactListResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
      required:
        - contacts
        - total

    CreateContactBody:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        title:
          type: string
        company_id:
          type: string
        status:
          type: string
          enum: [new, active, qualified, unqualified, customer]
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - first_name
        - last_name

    UpdateContactBody:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        title:
          type: string
        company_id:
          type: string
        status:
          type: string
          enum: [new, active, qualified, unqualified, customer]
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        lead_score:
          type: number

    Company:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        name:
          type: string
        domain:
          type: string
        industry:
          type: string
        size:
          type: string
          enum: [1-10, 11-50, 51-200, 201-500, 501-1000, 1000+]
        country:
          type: string
        revenue:
          type: integer
          description: Revenue in smallest currency unit
        logo_url:
          type: string
        linkedin_url:
          type: string
        website:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        contact_count:
          type: integer
        deal_count:
          type: integer
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - created_at

    CompanyListResponse:
      type: object
      properties:
        companies:
          type: array
          items:
            $ref: "#/components/schemas/Company"
        total:
          type: integer
      required:
        - companies
        - total

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        industry:
          type: string
        size:
          type: string
          enum: [1-10, 11-50, 51-200, 201-500, 501-1000, 1000+]
        country:
          type: string
        revenue:
          type: integer
        website:
          type: string
        description:
          type: string
      required:
        - name

    UpdateCompanyBody:
      type: object
      properties:
        name:
          type: string
        domain:
          type: string
        industry:
          type: string
        size:
          type: string
          enum: [1-10, 11-50, 51-200, 201-500, 501-1000, 1000+]
        country:
          type: string
        revenue:
          type: integer
        website:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string

    Deal:
      type: object
      properties:
        id:
          type: string
        org_id:
          type: string
        title:
          type: string
        contact_id:
          type: string
        contact_name:
          type: string
        company_id:
          type: string
        company_name:
          type: string
        stage:
          type: string
          enum: [lead, qualified, proposal, negotiation, closed_won, closed_lost]
        value:
          type: integer
          description: Deal value in smallest currency unit
        currency:
          type: string
          default: USD
        probability:
          type: number
          minimum: 0
          maximum: 100
        expected_close_date:
          type: string
        notes:
          type: string
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
        updated_at:
